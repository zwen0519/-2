<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>阿倫冰店 - QR 產生器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { background-color: #f8fafc; }
        .card { background: white; border-radius: 2rem; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div class="card p-8 w-full max-w-md text-center">
        <h1 class="text-2xl font-black text-blue-600 mb-6 italic">阿倫冰店 QR 產生器</h1>
        
        <div class="bg-blue-50 p-6 rounded-3xl mb-6 flex flex-col items-center justify-center border-2 border-dashed border-blue-200">
            <div id="qrcode" class="mb-4"></div>
            <div id="url-display" class="text-[10px] text-blue-400 break-all px-4 leading-tight">
                請輸入桌號生成網址
            </div>
        </div>

        <div class="space-y-4">
            <div>
                <label class="text-xs font-bold text-gray-400 uppercase tracking-widest block mb-2">設定桌號 (例如: A1, 05)</label>
                <input type="text" id="table-input" placeholder="12" 
                       class="w-full p-4 rounded-2xl bg-gray-50 border-none text-center text-2xl font-black text-blue-600 focus:ring-2 focus:ring-blue-500 transition-all">
            </div>

            <button onclick="generateQR()" 
                    class="w-full bg-blue-600 text-white font-black py-4 rounded-2xl text-xl shadow-lg active:scale-95 transition-all">
                生成點餐 QR Code
            </button>
        </div>
        
        <p class="text-gray-400 text-xs mt-6 italic font-medium">產生的圖片可直接手機截圖列印</p>
    </div>

    <script>
        const qrcode = new QRCode(document.getElementById("qrcode"), {
            width: 200,
            height: 200,
            colorDark : "#000000",
            colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.H
        });

        function generateQR() {
            const tableVal = document.getElementById('table-input').value.trim();
            if (!tableVal) {
                alert("請輸入桌號！");
                return;
            }

            // --- 核心修正：直接指向你的 GitHub 線上網址 ---
            const baseUrl = "https://zwen0519.github.io/-2/menu.html";
            const finalUrl = `${baseUrl}?table=${tableVal}`;

            // 更新 QR Code
            qrcode.clear();
            qrcode.makeCode(finalUrl);

            // 顯示生成的網址供確認
            document.getElementById('url-display').innerText = `產生的點餐網址：\n${finalUrl}`;
        }

        // 預設先產一個 12 號桌的
        document.getElementById('table-input').value = "12";
        generateQR();
    </script>
</body>
</html>
