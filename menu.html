<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>阿倫冰店 - 線上點餐</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .btn-active:active { transform: scale(0.95); transition: 0.1s; }
        
        body {
            background-color: #f1f5f9; /* 稍微深一點的底色襯托透明感 */
            min-height: 100vh;
            margin: 0;
            position: relative;
        }

        /* --- 1. 大幅強化背景圖的可見度 --- */
        .bg-illustration {
            position: fixed;
            top: 52%; 
            left: 50%;
            transform: translate(-50%, -50%);
            width: 70%; /* 寬度稍微放大一點 */
            opacity: 0.5; /* --- 不透明度提高到 0.5，背景會變得很清楚 --- */
            z-index: 0; 
            pointer-events: none;
        }

        #main-content {
            position: relative;
            z-index: 10;
        }

        /* --- 2. 選項白色區塊改為高度半透明 (玻璃效果) --- */
        .menu-card {
            /* 調整為 rgba(255, 255, 255, 0.65)，這代表白色只有 65% 不透明 */
            background-color: rgba(255, 255, 255, 0.65) !important; 
            backdrop-filter: blur(5px); /* 微弱的模糊，確保文字在背景上依然清晰 */
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            transition: all 0.3s;
        }
    </style>
</head>
<body class="pb-44 font-sans text-gray-900">

    <img src="S__15851531.jpg" 
         class="bg-illustration" 
         alt="背景裝飾">

    <div id="main-content">
        <div class="bg-gradient-to-r from-blue-700 to-blue-500 p-6 text-white text-center shadow-md sticky top-0 z-50">
            <h1 class="text-2xl font-black tracking-widest text-white">潮州燒冷冰 (阿倫冰店)</h1>
            <div class="mt-2 inline-flex items-center bg-white/20 px-4 py-1 rounded-full border border-white/30 shadow-inner">
                <span class="text-sm font-bold text-white">桌號：<span id="display-table" class="text-yellow-300 text-lg ml-1 font-black">偵測中...</span></span>
            </div>
        </div>

        <div class="px-4 mt-6 max-w-md mx-auto">
            <div class="p-4 mb-6 rounded-r-xl menu-card border-l-4 border-l-yellow-400">
                <p class="font-bold text-yellow-700 text-sm mb-1">🔥 燒冷冰吃法祕訣：</p>
                <ul class="text-xs text-yellow-600 space-y-1">
                    <li>1. <strong>請勿攪拌</strong></li>
                    <li>2. <strong>從邊邊由下往上吃</strong></li>
                    <li>3. 感受熱圓仔與冷冰的口感交替</li>
                </ul>
            </div>

            <div class="space-y-3" id="menu-list"></div>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 bg-white/75 shadow-[0_-10px_40px_rgba(0,0,0,0.1)] rounded-t-[32px] p-6 z-[60] backdrop-blur-md border-t border-white/30">
        <div class="max-w-md mx-auto">
            <div class="flex justify-between items-end mb-4">
                <div>
                    <p class="text-gray-400 text-xs font-bold mb-1 tracking-widest uppercase">目前總計</p>
                    <p class="text-4xl font-black text-red-600 flex items-start">
                        <span class="text-lg mt-1 mr-1">$</span><span id="total-price">0</span>
                    </p>
                </div>
                <button id="submit-btn" onclick="submitOrder()" class="btn-active bg-blue-600 text-white px-10 py-4 rounded-2xl font-black text-xl shadow-lg">
                    送出訂單
                </button>
            </div>
            <div id="cart-preview" class="text-xs text-gray-400 border-t pt-3 italic text-center">快選幾碗好吃的燒冷冰吧！</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB7BKrE4Nq0ZPDPcOvj5iJ7nwh1eFtH8PE",
            authDomain: "alun-ice-shop.firebaseapp.com",
            databaseURL: "https://alun-ice-shop-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "alun-ice-shop",
            storageBucket: "alun-ice-shop.firebasestorage.app",
            messagingSenderId: "1056267942090",
            appId: "1:1056267942090:web:febe00a2468dd95d9d9c33"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const menuItems = [
            { id: 0, name: "綜合燒冷冰", price: 65, category: "招牌必點" },
            { id: 1, name: "綜合燒冷冰+煉乳", price: 70, category: "大受好評" },
            { id: 2, name: "綜合熱湯圓", price: 65, category: "冬日首選" },
            { id: 3, name: "冷凍芋", price: 65, category: "古早味" },
            { id: 4, name: "冷凍綠豆饌", price: 65, category: "經典冰品" },
            { id: 5, name: "紅豆冰", price: 65, category: "經典" },
            { id: 6, name: "花生冰", price: 65, category: "經典" },
            { id: 7, name: "牛奶冰", price: 65, category: "甜甜推薦" },
            { id: 8, name: "巧克力冰", price: 65, category: "甜甜推薦" },
            { id: 9, name: "烏梅冰", price: 65, category: "退火聖品" },
            { id: 10, name: "草莓冰", price: 65, category: "羊來了,草莓了" },
            { id: 11, name: "四果冰", price: 65, category: "四果一捏" }
        ];

        let cart = {};
        const urlParams = new URLSearchParams(window.location.search);
        const tableId = urlParams.get('table') || "測試桌";
        document.getElementById('display-table').innerText = tableId;

        window.renderMenu = function() {
            const list = document.getElementById('menu-list');
            list.innerHTML = menuItems.map(item => {
                const count = cart[item.id] || 0;
                return `
                    <div class="menu-card p-4 rounded-2xl flex justify-between items-center mb-3">
                        <div>
                            <span class="text-[10px] bg-blue-100/50 text-blue-600 px-2 py-0.5 rounded font-bold">${item.category}</span>
                            <h3 class="font-bold text-gray-800 text-lg mt-1">${item.name}</h3>
                            <p class="text-blue-700 font-black">$${item.price}</p>
                        </div>
                        <div class="flex items-center space-x-3 bg-white/40 p-1.5 rounded-2xl">
                            <button onclick="updateQty(${item.id}, -1)" class="w-10 h-10 rounded-xl bg-white/70 shadow-sm flex items-center justify-center text-gray-400 font-bold">-</button>
                            <span class="font-black text-xl w-6 text-center text-gray-700">${count}</span>
                            <button onclick="updateQty(${item.id}, 1)" class="w-10 h-10 rounded-xl bg-blue-600 shadow-md flex items-center justify-center text-white font-bold">+</button>
                        </div>
                    </div>`;
            }).join('');
        };

        window.updateQty = function(id, change) {
            cart[id] = (cart[id] || 0) + change;
            if (cart[id] <= 0) delete cart[id];
            renderMenu();
            updateCartUI();
        };

        function updateCartUI() {
            let total = 0; let summary = [];
            Object.keys(cart).forEach(id => {
                const item = menuItems.find(m => m.id == id);
                total += item.price * cart[id];
                summary.push(`${item.name} x ${cart[id]}`);
            });
            document.getElementById('total-price').innerText = total;
            document.getElementById('cart-preview').innerText = summary.length ? summary.join('、') : "快選幾碗好吃的燒冷冰吧！";
        }

        window.submitOrder = async function() {
            if (Object.keys(cart).length === 0) return alert("點餐清單是空的喔！");
            const btn = document.getElementById('submit-btn');
            btn.disabled = true; btn.innerText = "傳送中...";
            try {
                const orderData = {
                    table: tableId,
                    items: Object.keys(cart).map(id => {
                        const item = menuItems.find(m => m.id == id);
                        return { name: item.name, qty: cart[id] };
                    }),
                    total: document.getElementById('total-price').innerText,
                    time: new Date().toLocaleTimeString('zh-TW', { hour12: false, hour: '2-digit', minute: '2-digit' }),
                    timestamp: Date.now()
                };
                await set(push(ref(db, 'orders')), orderData);
                alert("訂單已傳送！");
                cart = {}; renderMenu(); updateCartUI();
            } catch (e) { alert("失敗，請聯絡櫃檯"); }
            finally { btn.disabled = false; btn.innerText = "送出訂單"; }
        };

        renderMenu();
    </script>
</body>
</html>
